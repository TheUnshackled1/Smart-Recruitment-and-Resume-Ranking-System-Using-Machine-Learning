<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Recruitment Site Stats</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@700;800&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #001F3F 0%, #00172a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px 20px;
        }

        .stats-container {
            max-width: 1200px;
            width: 100%;
            background: linear-gradient(135deg, #f8f9fb 0%, #ecf0f1 100%);
            border-radius: 20px;
            padding: 80px 40px;
            position: relative;
            overflow: hidden;
            box-shadow: 0 20px 60px rgba(0, 31, 63, 0.15);
        }

        /* Decorative background elements */
        .stats-container::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -10%;
            width: 500px;
            height: 500px;
            background: radial-gradient(circle, rgba(0, 217, 255, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        .stats-container::after {
            content: '';
            position: absolute;
            bottom: -30%;
            left: -5%;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, rgba(0, 31, 63, 0.05) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }

        .stats-content {
            position: relative;
            z-index: 1;
            text-align: center;
        }

        .stats-title {
            font-family: 'Poppins', sans-serif;
            font-size: 48px;
            font-weight: 800;
            color: #001F3F;
            margin-bottom: 70px;
            letter-spacing: -0.5px;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 40px;
            margin: 0 auto;
            max-width: 1000px;
        }

        .stat-card {
            background: white;
            border-radius: 15px;
            padding: 50px 30px;
            text-align: center;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
            border: 2px solid transparent;
            cursor: pointer;
            box-shadow: 0 10px 30px rgba(0, 31, 63, 0.08);
        }

        .stat-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #001F3F 0%, #00D9FF 100%);
            border-radius: 15px 15px 0 0;
            transform: scaleX(0);
            transform-origin: left;
            transition: transform 0.3s ease;
        }

        .stat-card:hover {
            transform: translateY(-12px);
            border-color: #00D9FF;
            box-shadow: 0 25px 50px rgba(0, 217, 255, 0.2);
        }

        .stat-card:hover::before {
            transform: scaleX(1);
        }

        .stat-number {
            font-family: 'Poppins', sans-serif;
            font-size: 64px;
            font-weight: 800;
            background: linear-gradient(135deg, #001F3F 0%, #00D9FF 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 15px;
            line-height: 1;
            transition: transform 0.3s ease;
        }

        .stat-card:hover .stat-number {
            transform: scale(1.1);
        }

        .stat-label {
            font-family: 'Inter', sans-serif;
            font-size: 16px;
            font-weight: 600;
            color: #2C3E50;
            text-transform: capitalize;
            letter-spacing: 0.5px;
        }

        .stat-icon {
            width: 12px;
            height: 12px;
            background: #00D9FF;
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .stat-card:hover .stat-icon {
            opacity: 1;
        }

        /* Responsive */
        @media (max-width: 768px) {
            .stats-container {
                padding: 60px 30px;
            }

            .stats-title {
                font-size: 36px;
                margin-bottom: 50px;
            }

            .stats-grid {
                grid-template-columns: repeat(2, 1fr);
                gap: 25px;
            }

            .stat-card {
                padding: 40px 20px;
            }

            .stat-number {
                font-size: 48px;
            }
        }

        @media (max-width: 480px) {
            .stats-container {
                padding: 40px 20px;
            }

            .stats-title {
                font-size: 28px;
                margin-bottom: 40px;
            }

            .stats-grid {
                grid-template-columns: 1fr;
                gap: 20px;
            }

            .stat-number {
                font-size: 40px;
            }
        }

        /* Animation on load */
        @keyframes fadeUpSlideIn {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .stats-title {
            animation: fadeUpSlideIn 0.6s ease 0.1s both;
        }

        .stat-card {
            animation: fadeUpSlideIn 0.6s ease forwards;
        }

        .stat-card:nth-child(1) { animation-delay: 0.2s; }
        .stat-card:nth-child(2) { animation-delay: 0.3s; }
        .stat-card:nth-child(3) { animation-delay: 0.4s; }
        .stat-card:nth-child(4) { animation-delay: 0.5s; }
    </style>
</head>
<body>
    <div class="stats-container">
        <div class="stats-content">
            <h2 class="stats-title">Smart Recruitment Site Stats</h2>
            <div class="stats-grid">
                <div class="stat-card">
                    <div class="stat-number">3</div>
                    <span class="stat-icon"></span>
                    <div class="stat-label">Candidates</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">3</div>
                    <span class="stat-icon"></span>
                    <div class="stat-label">Job Posted</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">40</div>
                    <span class="stat-icon"></span>
                    <div class="stat-label">Jobs Filled</div>
                </div>
                <div class="stat-card">
                    <div class="stat-number">3</div>
                    <span class="stat-icon"></span>
                    <div class="stat-label">Companies</div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
